context:
  name: bubblewrap
  version: "0.11.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/containers/bubblewrap/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3fc7b94dd133539365dc573fe79d207802ce433e6e34b791a8b1080b17803a28

build:
  number: 1
  skip:
    - not linux
  script: |
    meson _builddir -Dselinux=disabled ${MESON_ARGS}
    meson compile -C _builddir
    meson test -C _builddir
    meson install -C _builddir
    # Pixi: prevent CONDA_PREFIX from leaking into sandboxed processes
    mkdir -p ${PREFIX}/etc/pixi/bwrap
    touch ${PREFIX}/etc/pixi/bwrap/global-ignore-conda-prefix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - pkg-config
    - meson
    - ninja
  host:
    - libcap

tests:
  - script:
      - bwrap --help

about:
  homepage: https://github.com/containers/bubblewrap
  repository: https://github.com/containers/bubblewrap
  license: LGPL-2.0-or-later
  license_file: COPYING
  summary: Unprivileged sandboxing tool

extra:
  recipe-maintainers:
    - wolfv
